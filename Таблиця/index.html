<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Table Grid</title>
    <style>
        td {
            background-color: orange;
            text-align: center;
        }

        table {
            width: 300px;
            height: 300px;
            border-collapse: collapse;
        }

        .red {
            background-color: red;
        }

        .green {
            background-color: green;
        }

        .blue {
            background-color: blue;
        }

        .border-top {
            border-top: 1px dashed red;
        }

        .border-bottom {
            border-bottom: 1px dashed red;
        }
    </style>
</head>

<body>
    <table border="1">
        <tr>
            <td class="border-top">1</td>
            <td class="border-top">2</td>
            <td class="border-top">3</td>
            <td class="border-top">4</td>
        </tr>
        <tr>
            <td>5</td>
            <td rowspan="2" class="blue">6</td>
            <td>7</td>
            <td>8</td>
        </tr>
        <tr>
            <td>9</td>
            <td>11</td>
            <td>12</td>
        </tr>
        <tr>
            <td>13</td>
            <td class="red">14</td>
            <td>15</td>
            <td>16</td>
        </tr>
        <tr>
            <td>17</td>
            <td class="red">18</td>
            <td>19</td>
            <td>20</td>
        </tr>
        <tr>
            <td>21</td>
            <td class="red">22</td>
            <td>23</td>
            <td>24</td>
        </tr>
        <tr>
            <td>25</td>
            <td class="green" colspan="3">26</td>
        </tr>
        <tr>
            <td>29</td>
            <td class="blue">30</td>
            <td class="blue">31</td>
            <td class="blue">32</td>
        </tr>
    </table>
</body>

</html>
